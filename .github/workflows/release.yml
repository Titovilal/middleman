name: Release

on:
  push:
    tags:
      - "[0-9]*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X github.com/Titovilal/context0/cmd.Version=${{ github.ref_name }}" -o ctx-${{ matrix.suffix }} .
      - uses: actions/upload-artifact@v5
        with:
          name: ctx-${{ matrix.suffix }}
          path: ctx-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG".."${{ github.ref_name }}" --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          {
            echo "notes<<EOF"
            echo "## What's changed"
            echo ""
            echo "$CHANGES"
            echo ""
            echo "## Installation"
            echo ""
            echo '**Linux / macOS:** `curl -sL https://raw.githubusercontent.com/Titovilal/context0/main/install.sh | sh`'
            echo ""
            echo '**Windows (PowerShell):** `irm https://raw.githubusercontent.com/Titovilal/context0/main/install.ps1 | iex`'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ steps.changelog.outputs.notes }}
